    try {
      if (clock && view.slider) {
        api.evalCommand('SetColor(' + clock + ', "' + quoteGeoGebraString(view.slider) + '")');
        api.evalCommand('SetLabelColor(' + clock + ', "' + quoteGeoGebraString(view.slider) + '")');
      }
    } catch (e) {}
  }

  // ------------------------------------------------------------------ Load scene
  function loadScene() {
    if (window.__SCENE__) return Promise.resolve(window.__SCENE__); // CLI inline mode
    return fetch("scene.json", { cache: "no-store" }).then(function (r) {
      if (!r.ok) throw new Error("Cannot read scene.json (" + r.status + ")");
      return r.json();
    });
  }

  // ------------------------------------------------------------------ Boot
  function boot() {
    if (typeof GGBApplet === "undefined") {
      log("Failed to load deployggb.js. Check the network or use the offline GeoGebra Math Apps Bundle.", "err");
      showStatus(true);
      return;
    }
    loadScene().then(function (s) { inject(prepareClassic6Scene(applyAnimationStyle(s))); }).catch(function (e) {
      log("Failed to load scene: " + e.message, "err");
      showStatus(true);
    });
  }

  function inject(s) {
    scene = s;
    document.getElementById("title").textContent = scene.title || "GeoGebra Animation";
    document.getElementById("title").title = scene.title || "GeoGebra Animation";
    document.title = (scene.title || "GeoGebra") + " · Preview";
    var host = document.getElementById("ggb");
    var params = {
      appName: scene.app || "classic",
      language: "en",
      width: host.clientWidth || window.innerWidth,
      height: host.clientHeight || (embedded ? window.innerHeight : window.innerHeight - 120),
      showToolBar: false,
      showMenuBar: false,
      showAlgebraInput: false,
      showResetIcon: false,
      enableRightClick: true,
      enableShiftDragZoom: true,
      showZoomButtons: !embedded,
      appletOnLoad: onLoad,
      // The view is applied again in onLoad so it is captured by getBase64.
      showToolBarHelp: false
    };
    new GGBApplet(params, true).inject("ggb");
  }

  // ------------------------------------------------------------------ Build
  function onLoad(ggbApi) {
    api = ggbApi;
    window.api = ggbApi; // Used by the headless CLI for check/export.

    // Disable modal error dialogs so headless runs cannot hang on bad commands.
    try { api.setErrorDialogsActive(false); } catch (e) {}
    try { api.setPerspective("G"); } catch (e) {} // Keep only the graphics view.

    applyView(scene.view || {});
    buildObjects(scene.objects || []);
    patchDirections(scene.animate || []); // Best-effort animation direction patch.
    applyView(scene.view || {});          // Re-apply the view after setXML.
    applyAnimationViewStyle(scene.animationStyle);
    applyAnimate(scene.animate || []);

    // Export frame. Defaults to the clock slider minimum.
    captureAt = (typeof scene.captureAt === "number") ? scene.captureAt : sliderMin(clock);

    // Ready. The following window.* hooks are used by headless check/export.
    enableButtons(true);
    scheduleAppletResize(true);
    window.__BUILD__ = built;          // Build result: { ok, errors, lines }
    window.__CLOCK__ = clock;          // Main clock slider name.
    window.__CAPTURE_AT__ = captureAt; // Export frame value.
    // Single source of .ggb base64. Download and CLI export share this logic.
    window.__getGGBBase64 = function () {
      return new Promise(function (res) {
        try { api.stopAnimation(); } catch (e) {}
        try { if (clock) api.setValue(clock, captureAt); } catch (e) {}
        api.getBase64(res);
      });
    };
    window.__reloadGGBBase64 = function (b64) {
      return new Promise(function (res) {
        try {
          api.setBase64(b64, function () {
            var xml = "";
            try { xml = api.getXML(); } catch (e) {}
            res({ ok: !!xml, xmlLength: xml.length });
          });
        } catch (e) {
          res({ ok: false, error: e && e.message ? e.message : String(e) });
        }
      });
    };
    window.__freshLoadGGBBase64 = function (b64, labels, appName) {
      return new Promise(function (res) {
        var id = "ggb-fresh-" + Date.now() + "-" + Math.random().toString(36).slice(2);
        var host = document.createElement("div");
        var done = false;
        host.id = id;
        host.style.position = "fixed";
        host.style.left = "-10000px";
        host.style.top = "0";
        host.style.width = "900px";
        host.style.height = "600px";
        host.style.overflow = "hidden";
        document.body.appendChild(host);
        function finish(result) {
          if (done) return;
          done = true;
          result = result || {};
          result.dialogText = result.dialogText || "";
          result.ok = !!result.ok;
          setTimeout(function () { try { host.remove(); } catch (e) {} }, 0);
          res(result);
        }
        function visibleErrorText() {
          var text = "";
          try { text = document.body.innerText || ""; } catch (e) {}
          var m = text.match(/(Error|Open file failed|processing of command|\u6253\u5F00\u6587\u4EF6\u5931\u8D25|\u5904\u7406\u547D\u4EE4)[\s\S]{0,800}/);
          return m ? m[0] : "";
        }
        var params = {
          appName: appName || scene.app || "classic",
          language: "en",
          width: 900,
          height: 600,
          showToolBar: false,
          showMenuBar: false,
          showAlgebraInput: false,
          ggbBase64: b64,
          appletOnLoad: function (freshApi) {
            setTimeout(function () {
              var missing = (labels || []).filter(function (label) {
                try { return !freshApi.exists(label); } catch (e) { return true; }
              });
              var dialogText = visibleErrorText();
              finish({ ok: missing.length === 0 && !dialogText, missing: missing, dialogText: dialogText });
            }, 500);
          }
        };
        try {
          new GGBApplet(params, true).inject(id);
        } catch (e) {
          finish({ ok: false, missing: labels || [], dialogText: e && e.message ? e.message : String(e) });
        }
        setTimeout(function () {
          finish({ ok: false, missing: labels || [], dialogText: visibleErrorText() || "Timed out while loading .ggb into a fresh applet." });
        }, 20000);
      });
    };
    window.__READY__ = true;           // Headless readiness flag.

    if (scene.autoplay !== false && clock) { startPlay(); }

    log(built.ok ? "Build complete. All commands passed." : "Build complete, but at least one command failed.", built.ok ? "ok" : "err");
    if (!built.ok) showStatus(true);
  }

  function applyView(v) {
    applyViewTo(api, v);
  }
  function applyViewTo(targetApi, v) {
    try {
      if (Array.isArray(v.coords) && v.coords.length === 4) {
        targetApi.setCoordSystem(v.coords[0], v.coords[1], v.coords[2], v.coords[3]);
      }
      var ax = v.axes !== false;
      targetApi.setAxesVisible(ax, ax);
      targetApi.setGridVisible(!!v.grid);
      if (Array.isArray(v.axisRatio) && v.axisRatio.length === 2) {
        targetApi.evalCommand("SetAxesRatio(" + v.axisRatio[0] + ", " + v.axisRatio[1] + ")");
      }
    } catch (e) { log("Failed to apply view: " + e.message, "err"); }
  }

  // Scripting commands do not create objects; evalCommand may return false even when they work.
  var SCRIPTING = {
    SetColor: 1, SetBackgroundColor: 1, SetDynamicColor: 1, SetLabelColor: 1,
    SetPointSize: 1, SetPointStyle: 1, SetLineThickness: 1, SetLineStyle: 1, SetFilling: 1,
    SetVisibleInView: 1, SetLabelMode: 1, SetCaption: 1, SetTrace: 1, SetValue: 1, SetCoords: 1,
    SetConditionToShowObject: 1, SetLayer: 1, SetTooltipMode: 1, SetFixed: 1, SetSpinSpeed: 1,
    ShowLabel: 1, StartAnimation: 1, SelectObjects: 1, Delete: 1, Rename: 1, PlaySound: 1
  };
  // Success rules vary by command type:
  //  assign  (name=... / f(x)=...) -> success means exists(name)
  //  script  (SetColor, SetTrace)  -> false return still counts as success
  //  create  (bare command)        -> trust evalCommand return
  function classify(cmd) {
    var mAssign = cmd.match(/^\s*([A-Za-z_]\w*)\s*(?:\([^)]*\))?\s*(?::=|=(?!=)|:)/);
    if (mAssign) return { kind: "assign", name: mAssign[1] };
    var mHead = cmd.match(/^\s*([A-Za-z]\w*)\s*\(/);
    if (mHead && SCRIPTING[mHead[1]]) return { kind: "script" };
    return { kind: "create" };
  }

  function buildObjects(objs) {
    built = { ok: true, errors: [], lines: [] };
    for (var i = 0; i < objs.length; i++) {
      var cmd = cmdOf(objs[i]);
      if (!cmd.trim()) continue;
      var sourceIssue = expressionWrapperIssue(cmd, i);
      if (sourceIssue) {
        built.ok = false;
        built.errors.push({ i: i, cmd: cmd, reason: sourceIssue });
        log("[" + (i + 1) + "] ✗ " + sourceIssue, "err");
        log("  -> Prefer verified direct definitions over guessed wrapper commands for algebraic objects.", "info");
        break;
      }
      var ret = false;
      try { ret = api.evalCommand(cmd); } catch (e) { ret = false; }
      var cls = classify(cmd);
      var ok = cls.kind === "assign" ? objExists(cls.name) : cls.kind === "script" ? true : ret;
      built.lines.push({ i: i, cmd: cmd, ok: ok, kind: cls.kind });
      if (ok) {
        log("[" + (i + 1) + "] ✓ " + cmd + (cls.kind === "script" ? "  (script command)" : ""), "ok");
      } else {
        built.ok = false;
        built.errors.push({ i: i, cmd: cmd });
        log("[" + (i + 1) + "] ✗ Command failed: " + cmd, "err");
        log("  -> Check English command names, explicit *, dependency order, documented command signatures, and whether the selected app supports this command.", "info");
        break; // Stop at the first real failure because later commands usually depend on it.
      }
    }
    // Assert that the animation target exists.
    clock = firstTarget(scene.animate);
    if (clock && !objExists(clock)) {
      built.ok = false;
      built.errors.push({ i: -1, cmd: "animate.target '" + clock + "' does not exist" });
      log("✗ Animation target '" + clock + "' is not defined. Check animate.target and objects.", "err");
    }
  }

  function objExists(name) {
    try { return !!api.exists(name); } catch (e) {
      try { return !!api.isDefined(name); } catch (e2) { return false; }
    }
  }
  function firstTarget(anim) { return (anim && anim[0] && anim[0].target) || null; }
  function sliderMin(name) {
    if (!name) return 0;
    try { var v = api.getValue(name); return typeof v === "number" ? 0 : 0; } catch (e) { return 0; }
  }

  // Best-effort animation direction patch:
  // oscillating(0), increasing(1), decreasing(2), increasing-once(3).
  // It edits the slider <animation type="X"> in XML and loads it back.
  function patchDirections(anim) {
    var map = { oscillating: 0, increasing: 1, decreasing: 2, "increasing-once": 3 };
    if (!anim || !anim.length) return;
    var xml, changed = false;
    try { xml = api.getXML(); } catch (e) { return; }
    for (var k = 0; k < anim.length; k++) {
      var a = anim[k];
      var t = map[a.direction || "oscillating"];
      if (t === undefined || t === 0) continue;
      var re = new RegExp('(<element\\b[^>]*\\blabel="' + escapeRegExp(a.target) + '"[\\s\\S]*?<animation\\b[^>]*\\btype=")\\d+(")');
      var nx = xml.replace(re, "$1" + t + "$2");
      if (nx !== xml) { xml = nx; changed = true; }
    }
    if (changed) { try { api.setXML(xml); } catch (e) { log("Failed to set animation direction. Falling back to default oscillation: " + e.message, "info"); } }
  }

  function applyAnimate(anim) {
    applyAnimateTo(api, anim);
  }
  function applyAnimateTo(targetApi, anim) {
    for (var k = 0; k < (anim || []).length; k++) {
      var a = anim[k];
      try {
        if (typeof a.speed === "number") targetApi.setAnimationSpeed(a.target, a.speed);
        targetApi.setAnimating(a.target, true);
      } catch (e) {}
    }
  }

  // ------------------------------------------------------------------ Playback controls
  var playing = false;
  function startPlay() { try { api.startAnimation(); playing = true; syncPlayBtn(); } catch (e) {} }
  function stopPlay() { try { api.stopAnimation(); playing = false; syncPlayBtn(); } catch (e) {} }
  function togglePlay() { playing ? stopPlay() : startPlay(); }
  function syncPlayBtn() {
    setToolbarButton("btn-play", playing ? "⏸" : "▶︎", playing ? "Pause" : "Play", playing ? "Pause animation" : "Play animation");
  }
  function resetClock() {
    stopPlay();
    try { if (clock) api.setValue(clock, captureAt); } catch (e) {}
  }

  // ------------------------------------------------------------------ Export
  function ggbBase64ToBlob(b64) {
    var bin = atob(b64), arr = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return new Blob([arr], { type: "application/vnd.geogebra.file" });
  }
  function download(filename, blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function () { URL.revokeObjectURL(url); a.remove(); }, 1000);
  }
  function objExistsFor(targetApi, name) {
    try { return !!targetApi.exists(name); } catch (e) {
      try { return !!targetApi.isDefined(name); } catch (e2) { return false; }
    }
  }
  function localizedCommandNames(xml) {
    var names = {};
    var out = [];
    var re = /<command\b[^>]*\bname="([^"]+)"/g;
    var m;
    while ((m = re.exec(String(xml || "")))) {
      if (/[^\x00-\x7F]/.test(m[1]) && !names[m[1]]) {
        names[m[1]] = true;
        out.push(m[1]);
      }
    }
    return out;
  }
  function downloadGGB() {
    if (!api) return;
    var wasPlaying = playing;
    var info = exportTargetInfo();
    log("Preparing " + info.label + " for " + info.target + ".", "info");
    log("Support note: " + info.note + ".", "info");
    showStatus(true);
    if (!built.ok) {
      log("Blocked .ggb download because the current preview build has failed commands.", "err");
      if (wasPlaying) startPlay();
      return;
    }
    var xml = "";
    try { xml = api.getXML(); } catch (e) {}
    var localized = localizedCommandNames(xml);
    if (localized.length) {
      log("Blocked .ggb download because the GeoGebra XML contains localized command names: " + localized.join(", "), "err");
      if (wasPlaying) startPlay();
      return;
    }
    var cjk = cjkSnippets(xml);
    if (cjk.length) {
      log("Blocked .ggb download because the GeoGebra XML still contains CJK text:", "err");
      cjk.forEach(function (s) { log("  - " + s, "err"); });
      showStatus(true);
      if (wasPlaying) startPlay();
      return;
    }
    var desktopIssues = xmlDesktopCommandIssues(xml);
    if (desktopIssues.length) {
      log("Blocked Classic 6 .ggb download because the XML contains unstable geometry command inputs:", "err");
      desktopIssues.forEach(function (s) { log("  - " + s, "err"); });
      showStatus(true);
      if (wasPlaying) startPlay();
      return;
    }
    window.__getGGBBase64().then(function (b64) {
      return window.__freshLoadGGBBase64(b64, definedObjectNames(), info.appName).then(function (fresh) {
        if (!fresh || !fresh.ok) {
          log("Blocked .ggb download because fresh-open verification failed.", "err");
          if (fresh && fresh.missing && fresh.missing.length) log("Missing objects: " + fresh.missing.join(", "), "err");
          if (fresh && fresh.dialogText) log(fresh.dialogText, "err");
          showStatus(true);
          if (wasPlaying) startPlay();
          return;
        }
        download(safeName() + ".ggb", ggbBase64ToBlob(b64));
        log("Exported " + safeName() + ".ggb.", "ok");
        log("Use with: " + info.target + ". Desktop builds may require pressing Play.", "ok");
        showStatus(true);
        if (wasPlaying) startPlay();
      });
    });
  }
  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).then(function () { return true; }).catch(function () {
        return fallbackCopyText(text);
      });
    }
    return fallbackCopyText(text);
  }
  function fallbackCopyText(text) {
    return new Promise(function (resolve, reject) {
      var textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "readonly");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      try {
        if (document.execCommand("copy")) resolve();
        else reject(new Error("execCommand returned false"));
      } catch (e) {
        reject(e);
      } finally {
        textarea.remove();
      }
    });
  }
  function downloadScript() {
    download(safeName() + ".script.txt", new Blob([scriptText()], { type: "text/plain" }));
    log("Exported " + safeName() + ".script.txt", "ok");
    showStatus(true);
  }
  function openScriptModal() {
    var modal = document.getElementById("script-modal");
    var code = document.querySelector("#script-text code");
    code.innerHTML = highlightedScriptHtml(scriptText());
    document.getElementById("script-count").textContent = (scene.objects || []).length + " commands";
    modal.hidden = false;
    setTimeout(function () { document.getElementById("script-text").focus(); }, 0);
  }
  function closeScriptModal() {
    document.getElementById("script-modal").hidden = true;
  }
  function selectScriptCode() {
    var code = document.querySelector("#script-text code");
    var selection = window.getSelection();
    var range = document.createRange();
    range.selectNodeContents(code);
    selection.removeAllRanges();
    selection.addRange(range);
    document.getElementById("script-text").focus();
  }
  function copyScriptFromModal() {
    var button = document.getElementById("btn-copy-script");
    copyText(scriptText()).then(
      function () { pulseButton(button, "✓ Copied"); },
      function () {
        selectScriptCode();
        pulseButton(button, "Select Script");
      }
    );
  }

  // ------------------------------------------------------------------ UI wiring
  function enableButtons(on) {
    ["btn-play", "btn-reset", "btn-ggb", "btn-view-script"].forEach(function (id) {
      document.getElementById(id).disabled = !on;
    });
  }
  document.getElementById("btn-play").onclick = togglePlay;
  document.getElementById("btn-reset").onclick = resetClock;
  document.getElementById("btn-ggb").onclick = downloadGGB;
  document.getElementById("btn-view-script").onclick = openScriptModal;
  document.getElementById("btn-close-script").onclick = closeScriptModal;
  document.getElementById("btn-copy-script").onclick = copyScriptFromModal;
  document.getElementById("btn-download-script-modal").onclick = downloadScript;
  document.getElementById("btn-log").onclick = function () { showStatus(); };
  document.getElementById("script-modal").onclick = function (event) {
    if (event.target.id === "script-modal") closeScriptModal();
  };
  window.addEventListener("keydown", function (event) {
    if (event.key === "Escape") closeScriptModal();
  });

  function resizeApplet(force) {
    if (!api || !api.setSize) return;
    var host = document.getElementById("ggb");
    host.style.width = "100%";
    host.style.maxWidth = "none";
    var rect = host.getBoundingClientRect();
    var viewportWidth = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
    var width = Math.max(1, Math.round(Math.max(rect.width, host.clientWidth || 0, viewportWidth)));
    var height = Math.max(1, Math.round(rect.height));
    if (!force && width === lastAppletSize.width && height === lastAppletSize.height) return;
    lastAppletSize = { width: width, height: height };
    try { api.setSize(width, height); } catch (e) {}
    syncAppletDomSize(width, height);
    try {
      applyView(scene.view || {});
      applyAnimationViewStyle(scene.animationStyle);
    } catch (e) {}
  }
  function syncAppletDomSize(width, height) {
    var host = document.getElementById("ggb");
    var nodes = host.querySelectorAll(".applet_scaler, #ggbApplet, .GeoGebraFrame");
    for (var i = 0; i < nodes.length; i++) {
      nodes[i].style.width = width + "px";
      nodes[i].style.height = height + "px";
      nodes[i].style.maxWidth = "none";
    }
  }
  function scheduleAppletResize(force) {
    if (resizeScheduled) return;
    resizeScheduled = true;
    requestAnimationFrame(function () {
      resizeScheduled = false;
      resizeApplet(!!force);
      setTimeout(function () { resizeApplet(true); }, 120);
    });
  }
  window.addEventListener("resize", function () { scheduleAppletResize(true); });
  if (window.visualViewport) window.visualViewport.addEventListener("resize", function () { scheduleAppletResize(true); });
  if (window.ResizeObserver) {
    new ResizeObserver(function () { scheduleAppletResize(false); }).observe(document.getElementById("ggb"));
  }

  boot();
  </script>
</body>
</html>
